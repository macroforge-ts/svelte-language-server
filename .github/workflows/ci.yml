name: CI

permissions:
    contents: read
    id-token: write

on:
    push:
        branches: [main]
        tags:
            - 'v*'
    pull_request:
        branches: [main]

jobs:
    check:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Setup Deno
              uses: denoland/setup-deno@v2
              with:
                  deno-version: v2.x

            - name: Install dependencies
              run: deno install --node-modules-dir

            - name: Test
              run: deno task test
